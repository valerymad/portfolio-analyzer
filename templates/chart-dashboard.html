<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PORTFOLIO_NAME}} — Portfolio Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      padding: 24px;
    }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }
    .chart-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      height: 400px;
      margin-bottom: 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      background: #0d1117;
      color: #8b949e;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #30363d;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      font-size: 14px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .ticker-link {
      color: #58a6ff;
      text-decoration: none;
      font-weight: 600;
    }
    .ticker-link:hover { text-decoration: underline; }
    .company { color: #8b949e; font-size: 12px; }
    .positive { color: #3fb950; }
    .negative { color: #f85149; }
    .neutral { color: #d29922; }
    .verdict-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 12px;
    }
    .verdict-BUY { background: #1a7f37; color: #3fb950; }
    .verdict-HOLD { background: #6e4b00; color: #d29922; }
    .verdict-SELL { background: #8b1325; color: #f85149; }
    .bar-cell { position: relative; min-width: 200px; }
    .bar-bg {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 20px;
      border-radius: 4px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <h1>{{PORTFOLIO_NAME}}</h1>
  <div class="subtitle">{{TICKER_COUNT}} companies · Last updated: {{UPDATE_DATE}}</div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Price</th>
        <th>Base FV</th>
        <th>Upside</th>
        <th>Quality</th>
        <th>Verdict</th>
        <th>Assessed</th>
      </tr>
    </thead>
    <tbody>
      {{TABLE_ROWS}}
    </tbody>
  </table>

  <script>
    const DATA = {{CHART_DATA_JSON}};

    // Sort by upside descending
    const indices = DATA.tickers.map((_, i) => i);
    indices.sort((a, b) => DATA.upsides[b] - DATA.upsides[a]);

    const sorted = {
      tickers: indices.map(i => DATA.tickers[i]),
      upsides: indices.map(i => DATA.upsides[i]),
      verdicts: indices.map(i => DATA.verdicts[i]),
    };

    const colors = sorted.verdicts.map(v => {
      if (v === 'BUY') return '#3fb950';
      if (v === 'SELL') return '#f85149';
      return '#d29922';
    });

    const ctx = document.getElementById('chart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: sorted.tickers,
        datasets: [{
          label: 'Upside to Base Fair Value (%)',
          data: sorted.upsides,
          backgroundColor: colors.map(c => c + '33'),
          borderColor: colors,
          borderWidth: 1.5,
          borderRadius: 4,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c2128',
            borderColor: '#30363d',
            borderWidth: 1,
            callbacks: {
              label: (ctx) => `${ctx.parsed.x > 0 ? '+' : ''}${ctx.parsed.x.toFixed(1)}% upside`,
            },
          },
        },
        scales: {
          x: {
            ticks: {
              color: '#8b949e',
              callback: (v) => `${v > 0 ? '+' : ''}${v}%`,
            },
            grid: { color: '#21262d' },
          },
          y: {
            ticks: { color: '#e1e4e8', font: { weight: '600' } },
            grid: { display: false },
          },
        },
      },
    });
  </script>
</body>
</html>
